name: Build & Release WSL2 CachyOS Kernel

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v6.19-cachy-1)"
        required: true
        default: "v6.19-cachy-1"
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout actions repo
        uses: actions/checkout@v4

      - name: Make build script executable
        run: chmod +x ./build.sh

      - name: Run build script
        run: ./build.sh
        env:
          KERNEL_REPO: "https://github.com/Nevuly/WSL2-Linux-Kernel-Rolling"
          PATCH_BASE: "https://raw.githubusercontent.com/CachyOS/kernel-patches/master/6.19"

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(cat kernel-version.txt)-cachy-$(date +'%Y%m%d')" \
              >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "WSL2 CachyOS Kernel ${{ steps.tag.outputs.tag }}"
          body: |
            ## WSL2 Kernel — CachyOS patchset

            **Base source:** [Nevuly/WSL2-Linux-Kernel-Rolling](https://github.com/Nevuly/WSL2-Linux-Kernel-Rolling)

            ### Patches applied
            | Patch | Source |
            |-------|--------|
            | cachyos-base-all | CachyOS/kernel-patches · 6.19/all |
            | clang-polly      | CachyOS/kernel-patches · 6.19/misc |
            | bore-cachy       | CachyOS/kernel-patches · 6.19/sched |

            ### Build flags
            `LLVM=1 LLVM_IAS=1 LD=ld.lld KCFLAGS="-O2 -mllvm -polly"`

            See `README.md` inside the release for installation instructions.
          files: |
            release-artefacts/bzImage
            release-artefacts/kernel-modules.tar.gz
            release-artefacts/README.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
